version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: email-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST_PROD}
      - REDIS_PORT=${REDIS_PORT_PROD}
      - REDIS_PASSWORD=${REDIS_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - email-network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: email-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST_PROD}
      - REDIS_PORT=${REDIS_PORT_PROD}
      - REDIS_PASSWORD=${REDIS_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - email-network

networks:
  email-network:
    driver: bridge